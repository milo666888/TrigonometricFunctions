<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>三角函數 — 互動教具</title>
<style>
:root{
  --bg:#f4f5fa;--white:#fff;--surface2:#eef0f8;--border:#d8dcea;
  --accent:#3060e0;--sin-c:#c0392b;--cos-c:#2980b9;--tan-c:#27ae60;--sum-c:#7c3aed;
  --text:#1a1f36;--dim:#5a6280;--light:#9098b8;
  --pw:420px;--f:'Times New Roman','Noto Serif TC',Georgia,serif;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:var(--f);background:var(--bg);color:var(--text);
  overflow:hidden;height:100dvh;width:100vw;display:flex;flex-direction:column;font-size:16px;}

/* ── Header ── */
header{height:64px;display:flex;align-items:center;padding:0 18px;background:var(--white);
  border-bottom:1.5px solid var(--border);z-index:30;flex-shrink:0;gap:12px;}
.logo-ph{height:38px;width:38px;background:var(--surface2);border:1.5px dashed #c0c8e0;
  border-radius:8px;display:flex;align-items:center;justify-content:center;
  font-size:10px;color:var(--light);text-align:center;line-height:1.3;}
.logo-img{height:38px;width:auto;object-fit:contain;}
.hd-sep{width:1px;height:32px;background:var(--border);flex-shrink:0;}
.hd-title{flex:1;min-width:0;}
.hd-title h1{font-size:21px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.hd-title p{font-size:13px;color:var(--dim);margin-top:2px;}
.btn{padding:8px 18px;background:var(--surface2);border:1.5px solid var(--border);
  border-radius:8px;font-size:15px;color:var(--dim);cursor:pointer;
  font-family:var(--f);transition:all .15s;}
.btn:hover{color:var(--accent);border-color:var(--accent);background:#eef2ff;}

/* ── Layout ── */
.main{display:flex;flex:1;overflow:hidden;position:relative;}

/* ── Panel ── */
.panel{width:var(--pw);background:var(--white);border-right:1.5px solid var(--border);
  display:flex;flex-direction:column;overflow-y:auto;flex-shrink:0;z-index:10;}
.panel::-webkit-scrollbar{width:5px;}
.panel::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
.sec{padding:12px 18px;border-bottom:1.5px solid var(--border);}
.sec-title{display:flex;align-items:center;gap:8px;font-size:11px;font-weight:700;
  letter-spacing:.12em;text-transform:uppercase;color:var(--dim);margin-bottom:10px;}
.sec-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}

/* fn chips */
.fn-chips{display:flex;gap:7px;}
.fn-chip{flex:1;padding:9px 4px;border-radius:9px;border:2px solid var(--border);
  background:var(--surface2);font-family:var(--f);font-size:16px;font-style:normal;font-weight:700;
  cursor:pointer;text-align:center;transition:all .18s;color:var(--dim);}
.fn-chip[data-fn="sin"].on{background:rgba(192,57,43,.09);border-color:var(--sin-c);color:var(--sin-c);}
.fn-chip[data-fn="cos"].on{background:rgba(41,128,185,.09);border-color:var(--cos-c);color:var(--cos-c);}
.fn-chip[data-fn="tan"].on{background:rgba(39,174,96,.09);border-color:var(--tan-c);color:var(--tan-c);}
/* disabled state for superpos mode */
.fn-chip.locked{opacity:.45;cursor:default;pointer-events:none;}

/* mode chips */
.mode-chips{display:flex;gap:6px;flex-wrap:wrap;}
.mode-chip{padding:6px 11px;border-radius:8px;border:1.5px solid var(--border);
  background:var(--surface2);font-family:var(--f);font-size:13px;color:var(--dim);cursor:pointer;transition:all .15s;}
.mode-chip.on{background:#eef2ff;border-color:var(--accent);color:var(--accent);font-weight:700;}

/* ── Equation box in panel ── */
/* y= with space, all italic variables, numbers upright */
.eq-box{background:var(--surface2);border:1.5px solid var(--border);border-radius:10px;
  padding:9px 14px;font-size:17px;color:var(--text);margin-bottom:9px;
  line-height:1.65;min-height:44px;display:flex;align-items:center;flex-wrap:wrap;gap:0;
  font-style:italic;}
.eq-sin{border-left:3px solid var(--sin-c)!important;}
.eq-cos{border-left:3px solid var(--cos-c)!important;}
.eq-tan{border-left:3px solid var(--tan-c)!important;}
/* italic for vars */
.vi{font-style:italic;}
/* upright for numbers */
.vn{font-style:normal;}

/* Desc box */
.desc-box{background:#f0f4ff;border:1.5px solid #c8d4f8;border-radius:9px;
  padding:8px 12px;font-size:13px;color:var(--dim);line-height:1.9;margin-bottom:9px;}
.desc-box b{color:var(--text);}
.mode-desc{background:#fdf4ff;border-color:#d8b4fe;}

/* ── Param rows: label | number | slider ── */
.param-row{display:flex;align-items:center;gap:8px;margin-bottom:7px;}
.param-label{font-size:13px;color:var(--dim);width:80px;flex-shrink:0;}
.param-label .vi{font-style:italic;font-weight:700;color:var(--text);}
.param-num{width:64px;flex-shrink:0;}
.param-num input{width:100%;background:var(--white);border:1.5px solid var(--border);
  border-radius:7px;padding:6px 8px;font-family:var(--f);font-size:15px;font-style:normal;
  color:var(--text);outline:none;transition:border-color .15s;-moz-appearance:textfield;}
.param-num input::-webkit-inner-spin-button{-webkit-appearance:none;}
.param-num input.i-sin:focus{border-color:var(--sin-c);}
.param-num input.i-cos:focus{border-color:var(--cos-c);}
.param-num input.i-tan:focus{border-color:var(--tan-c);}
.param-slider{flex:1;}
.param-slider input[type=range]{width:100%;-webkit-appearance:none;appearance:none;
  height:5px;background:var(--border);border-radius:3px;outline:none;cursor:pointer;touch-action:pan-x;}
.param-slider input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:20px;height:20px;
  border-radius:50%;border:3px solid var(--white);box-shadow:0 1px 5px rgba(0,0,0,.25);cursor:pointer;}
.param-slider input[type=range]::-moz-range-thumb{width:20px;height:20px;
  border-radius:50%;border:3px solid var(--white);box-shadow:0 1px 5px rgba(0,0,0,.25);cursor:pointer;}
.r-sin::-webkit-slider-thumb{background:var(--sin-c);}
.r-cos::-webkit-slider-thumb{background:var(--cos-c);}
.r-tan::-webkit-slider-thumb{background:var(--tan-c);}
.r-sin::-moz-range-thumb{background:var(--sin-c);}
.r-cos::-moz-range-thumb{background:var(--cos-c);}
.r-tan::-moz-range-thumb{background:var(--tan-c);}

.fn-panel-hd{display:flex;align-items:center;gap:8px;font-size:13px;font-weight:700;
  letter-spacing:.05em;margin-bottom:8px;padding:5px 10px;border-radius:7px;background:var(--surface2);}
.fn-panel-hd .dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;}

/* Superpos result */
.sp-result{background:#fdf4ff;border:1.5px solid #d8b4fe;border-radius:9px;
  padding:9px 13px;font-size:14px;line-height:2.1;color:var(--text);}

/* Float info box — bottom right */
#floatInfo{position:absolute;bottom:20px;right:20px;z-index:20;
  min-width:260px;max-width:380px;background:rgba(255,255,255,.96);
  border:1.5px solid var(--border);border-radius:14px;padding:13px 15px;
  box-shadow:0 4px 20px rgba(26,31,54,.10);
  backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);
  font-family:var(--f);pointer-events:none;}
.fi-row{display:flex;align-items:flex-start;gap:8px;margin-bottom:6px;line-height:1.8;}
.fi-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;margin-top:5px;}
.fi-text{font-size:14px;color:var(--text);font-style:italic;}

#canvas{flex:1;display:block;cursor:default;touch-action:none;background:#fff;}

/* Mobile */
.fab{display:none;position:fixed;bottom:20px;left:20px;width:54px;height:54px;
  border-radius:50%;background:var(--accent);color:#fff;border:none;font-size:22px;
  cursor:pointer;box-shadow:0 4px 20px rgba(48,96,224,.4);z-index:200;
  align-items:center;justify-content:center;}
.mob-overlay{display:none;position:fixed;inset:0;z-index:100;pointer-events:none;}
.mob-overlay.open{pointer-events:all;}
.mob-bg{position:absolute;inset:0;background:rgba(10,15,40,.35);opacity:0;transition:opacity .28s;}
.mob-overlay.open .mob-bg{opacity:1;}
.mob-drawer{position:absolute;top:0;left:0;bottom:0;width:min(90vw,440px);
  background:var(--white);border-right:1.5px solid var(--border);overflow-y:auto;
  transform:translateX(-100%);transition:transform .32s cubic-bezier(.32,.72,0,1);}
.mob-overlay.open .mob-drawer{transform:translateX(0);}
.mob-dh{display:flex;align-items:center;justify-content:space-between;
  padding:16px 20px;border-bottom:1.5px solid var(--border);}
.mob-dt{font-size:18px;font-weight:700;}
.mob-x{width:36px;height:36px;border-radius:8px;background:var(--surface2);
  border:1.5px solid var(--border);font-size:18px;color:var(--dim);
  cursor:pointer;display:flex;align-items:center;justify-content:center;}
@media(max-width:760px){
  .panel{display:none;}.fab{display:flex;}.mob-overlay{display:block;}
  .hd-title p{display:none;}.hd-title h1{font-size:18px;}
  #floatInfo{max-width:calc(100vw - 44px);}
}
</style>
</head>
<body>

<header>
  <div style="display:flex;align-items:center;flex-shrink:0;">
    <img class="logo-img" src="company-logo.png"
         onerror="this.style.display='none';document.getElementById('lgph').style.display='flex';" alt="">
    <div class="logo-ph" id="lgph" style="display:none">LOGO</div>
  </div>
  <div class="hd-sep"></div>
  <div class="hd-title">
    <h1>三角函數</h1>
    <p>觀察三角函數圖形：平移、伸縮及疊合</p>
  </div>
  <div style="flex-shrink:0;">
    <button class="btn" onclick="resetAll()">↺ 重置</button>
  </div>
</header>

<div class="main">

<!-- ══ LEFT PANEL ══ -->
<div class="panel" id="mainPanel">

  <!-- 顯示函數 -->
  <div class="sec">
    <div class="sec-title"><span class="sec-dot" style="background:var(--accent)"></span>顯示函數（可複選）</div>
    <div class="fn-chips" id="fnChipsRow">
      <button class="fn-chip on" data-fn="sin" onclick="toggleFn('sin')">sin</button>
      <button class="fn-chip"    data-fn="cos" onclick="toggleFn('cos')">cos</button>
      <button class="fn-chip"    data-fn="tan" onclick="toggleFn('tan')">tan</button>
    </div>
  </div>

  <!-- 模式 -->
  <div class="sec">
    <div class="sec-title"><span class="sec-dot" style="background:var(--dim)"></span>圖形模式</div>
    <div class="mode-chips">
      <button class="mode-chip on" id="modeNormal"   onclick="setMode('normal')">一般</button>
      <button class="mode-chip"    id="modeAbs"      onclick="setMode('abs')">絕對值 |<i>f</i>(<i>x</i>)|</button>
      <button class="mode-chip"    id="modeSuperpos" onclick="setMode('superpos')">正餘弦疊合</button>
    </div>
    <div id="modeDesc" class="desc-box mode-desc" style="display:none;margin-top:8px;margin-bottom:0;"></div>
  </div>

  <!-- ── sin ── -->
  <div class="sec" id="sinSec">
    <div class="fn-panel-hd"><span class="dot" style="background:var(--sin-c)"></span>sin 參數</div>
    <div class="eq-box eq-sin" id="sinEq"></div>
    <div class="desc-box" id="sinDesc"></div>
    <div class="param-row">
      <div class="param-label"><span class="vi">a</span> 上下伸縮</div>
      <div class="param-num"><input class="i-sin" id="nSinA" type="number" step="0.1" value="1" oninput="P.sin.a=+this.value;redraw()"></div>
      <div class="param-slider"><input type="range" class="r-sin" id="sSinA" min="-4" max="4" step="0.05" value="1" oninput="P.sin.a=+this.value;redraw()"></div>
    </div>
    <div class="param-row">
      <div class="param-label"><span class="vi">b</span> 左右伸縮</div>
      <div class="param-num"><input class="i-sin" id="nSinB" type="number" step="0.1" value="1" oninput="P.sin.b=+this.value;redraw()"></div>
      <div class="param-slider"><input type="range" class="r-sin" id="sSinB" min="-4" max="4" step="0.05" value="1" oninput="P.sin.b=+this.value;redraw()"></div>
    </div>
    <div class="param-row">
      <div class="param-label"><span class="vi">c</span> 左右平移</div>
      <div class="param-num"><input class="i-sin" id="nSinC" type="number" step="0.1" value="0" oninput="P.sin.c=+this.value;redraw()"></div>
      <div class="param-slider"><input type="range" class="r-sin" id="sSinC" min="-6.28" max="6.28" step="0.05" value="0" oninput="P.sin.c=+this.value;redraw()"></div>
    </div>
    <div class="param-row">
      <div class="param-label"><span class="vi">d</span> 上下平移</div>
      <div class="param-num"><input class="i-sin" id="nSinD" type="number" step="0.1" value="0" oninput="P.sin.d=+this.value;redraw()"></div>
      <div class="param-slider"><input type="range" class="r-sin" id="sSinD" min="-4" max="4" step="0.05" value="0" oninput="P.sin.d=+this.value;redraw()"></div>
    </div>
  </div>

  <!-- ── cos ── -->
  <div class="sec" id="cosSec" style="display:none">
    <div class="fn-panel-hd"><span class="dot" style="background:var(--cos-c)"></span>cos 參數</div>
    <div class="eq-box eq-cos" id="cosEq"></div>
    <div class="desc-box" id="cosDesc"></div>
    <div class="param-row">
      <div class="param-label"><span class="vi">a</span> 上下伸縮</div>
      <div class="param-num"><input class="i-cos" id="nCosA" type="number" step="0.1" value="1" oninput="P.cos.a=+this.value;redraw()"></div>
      <div class="param-slider"><input type="range" class="r-cos" id="sCosA" min="-4" max="4" step="0.05" value="1" oninput="P.cos.a=+this.value;redraw()"></div>
    </div>
    <div class="param-row">
      <div class="param-label"><span class="vi">b</span> 左右伸縮</div>
      <div class="param-num"><input class="i-cos" id="nCosB" type="number" step="0.1" value="1" oninput="P.cos.b=+this.value;redraw()"></div>
      <div class="param-slider"><input type="range" class="r-cos" id="sCosB" min="-4" max="4" step="0.05" value="1" oninput="P.cos.b=+this.value;redraw()"></div>
    </div>
    <div class="param-row">
      <div class="param-label"><span class="vi">c</span> 左右平移</div>
      <div class="param-num"><input class="i-cos" id="nCosC" type="number" step="0.1" value="0" oninput="P.cos.c=+this.value;redraw()"></div>
      <div class="param-slider"><input type="range" class="r-cos" id="sCosC" min="-6.28" max="6.28" step="0.05" value="0" oninput="P.cos.c=+this.value;redraw()"></div>
    </div>
    <div class="param-row">
      <div class="param-label"><span class="vi">d</span> 上下平移</div>
      <div class="param-num"><input class="i-cos" id="nCosD" type="number" step="0.1" value="0" oninput="P.cos.d=+this.value;redraw()"></div>
      <div class="param-slider"><input type="range" class="r-cos" id="sCosD" min="-4" max="4" step="0.05" value="0" oninput="P.cos.d=+this.value;redraw()"></div>
    </div>
  </div>

  <!-- ── tan ── -->
  <div class="sec" id="tanSec" style="display:none">
    <div class="fn-panel-hd"><span class="dot" style="background:var(--tan-c)"></span>tan 參數</div>
    <div class="eq-box eq-tan" id="tanEq"></div>
    <div class="desc-box" id="tanDesc"></div>
    <div class="param-row">
      <div class="param-label"><span class="vi">a</span> 上下伸縮</div>
      <div class="param-num"><input class="i-tan" id="nTanA" type="number" step="0.1" value="1" oninput="P.tan.a=+this.value;redraw()"></div>
      <div class="param-slider"><input type="range" class="r-tan" id="sTanA" min="-4" max="4" step="0.05" value="1" oninput="P.tan.a=+this.value;redraw()"></div>
    </div>
    <div class="param-row">
      <div class="param-label"><span class="vi">b</span> 左右伸縮</div>
      <div class="param-num"><input class="i-tan" id="nTanB" type="number" step="0.1" value="1" oninput="P.tan.b=+this.value;redraw()"></div>
      <div class="param-slider"><input type="range" class="r-tan" id="sTanB" min="-4" max="4" step="0.05" value="1" oninput="P.tan.b=+this.value;redraw()"></div>
    </div>
    <div class="param-row">
      <div class="param-label"><span class="vi">c</span> 左右平移</div>
      <div class="param-num"><input class="i-tan" id="nTanC" type="number" step="0.1" value="0" oninput="P.tan.c=+this.value;redraw()"></div>
      <div class="param-slider"><input type="range" class="r-tan" id="sTanC" min="-6.28" max="6.28" step="0.05" value="0" oninput="P.tan.c=+this.value;redraw()"></div>
    </div>
    <div class="param-row">
      <div class="param-label"><span class="vi">d</span> 上下平移</div>
      <div class="param-num"><input class="i-tan" id="nTanD" type="number" step="0.1" value="0" oninput="P.tan.d=+this.value;redraw()"></div>
      <div class="param-slider"><input type="range" class="r-tan" id="sTanD" min="-4" max="4" step="0.05" value="0" oninput="P.tan.d=+this.value;redraw()"></div>
    </div>
  </div>

  <!-- ── 正餘弦疊合 ── -->
  <div class="sec" id="superposSec" style="display:none">
    <div class="fn-panel-hd"><span class="dot" style="background:var(--sum-c)"></span>正餘弦疊合參數</div>
    <div style="font-size:13px;color:var(--dim);margin-bottom:8px;">
      設 <i>y</i> = <i>p</i>·sin <i>x</i> + <i>q</i>·cos <i>x</i>，調整係數：
    </div>
    <div class="param-row">
      <div class="param-label"><span class="vi">p</span> sin 係數</div>
      <div class="param-num"><input id="nSP" type="number" step="0.1" value="1" style="width:100%;background:var(--white);border:1.5px solid var(--border);border-radius:7px;padding:6px 8px;font-family:var(--f);font-size:15px;font-style:normal;color:var(--text);outline:none;-moz-appearance:textfield;" oninput="SP.p=+this.value;redraw()"></div>
      <div class="param-slider"><input type="range" id="sSP" min="-5" max="5" step="0.05" value="1" class="r-sp" oninput="SP.p=+this.value;redraw()"></div>
    </div>
    <div class="param-row">
      <div class="param-label"><span class="vi">q</span> cos 係數</div>
      <div class="param-num"><input id="nSQ" type="number" step="0.1" value="1" style="width:100%;background:var(--white);border:1.5px solid var(--border);border-radius:7px;padding:6px 8px;font-family:var(--f);font-size:15px;font-style:normal;color:var(--text);outline:none;-moz-appearance:textfield;" oninput="SP.q=+this.value;redraw()"></div>
      <div class="param-slider"><input type="range" id="sSQ" min="-5" max="5" step="0.05" value="1" class="r-sp" oninput="SP.q=+this.value;redraw()"></div>
    </div>
    <div class="sp-result" id="spResult"></div>
  </div>

</div><!-- /panel -->

<canvas id="canvas"></canvas>

<!-- Float info: equation(s) at bottom right -->
<div id="floatInfo"><div id="fiContent"></div></div>
</div>

<button class="fab" onclick="openDrawer()">☰</button>
<div class="mob-overlay" id="MOV">
  <div class="mob-bg" onclick="closeDrawer()"></div>
  <div class="mob-drawer">
    <div class="mob-dh">
      <span class="mob-dt">方程式與設定</span>
      <button class="mob-x" onclick="closeDrawer()">✕</button>
    </div>
    <div id="mobContent"></div>
  </div>
</div>

<script>
// ══════════════════════════════════
//  CONFIG
// ══════════════════════════════════
const FNS=['sin','cos','tan'];
const FN_COLOR={sin:'#c0392b',cos:'#2980b9',tan:'#27ae60'};
const SUM_C='#7c3aed';
const FU="Times New Roman, Noto Serif TC, Georgia, serif";

const visible={sin:true,cos:false,tan:false};
let graphMode='normal';

// y = a·f(bx+c)+d
const P={
  sin:{a:1,b:1,c:0,d:0},
  cos:{a:1,b:1,c:0,d:0},
  tan:{a:1,b:1,c:0,d:0},
};
// superpos: y = p·sinx + q·cosx
const SP={p:1,q:1};

const canvas=document.getElementById('canvas');
const ctx=canvas.getContext('2d');
let dpr=window.devicePixelRatio||1;
let originX=0,originY=0,scale=60,_init=false;

// ══════════════════════════════════
//  CANVAS SETUP
// ══════════════════════════════════
function resize(){
  const main=document.querySelector('.main');
  const panel=document.querySelector('.panel');
  const pw=panel?panel.offsetWidth:0;
  const W0=main.offsetWidth-pw;
  const H0=main.offsetHeight;
  canvas.width=W0*dpr; canvas.height=H0*dpr;
  canvas.style.width=W0+'px'; canvas.style.height=H0+'px';
  ctx.setTransform(dpr,0,0,dpr,0,0);
  if(!_init){originX=W0/2;originY=H0/2;_init=true;}
  redraw();
}
window.addEventListener('resize',resize);

const toMx=sx=>(sx-originX)/scale;
const toSy=my=>originY-my*scale;

// ── number formatting ──
// All numbers displayed upright (font-style:normal in canvas ctx is default)
function f2(v){const r=Math.round(v*100)/100; return r===0?'0':String(r);}
function f3(v){const r=Math.round(v*1000)/1000; return r===0?'0':String(r);}

// ══════════════════════════════════
//  MATH
// ══════════════════════════════════
function evalBase(fn,x){
  const{a,b,c,d}=P[fn];
  const arg=b*x+c;
  if(fn==='sin') return a*Math.sin(arg)+d;
  if(fn==='cos') return a*Math.cos(arg)+d;
  const t=Math.tan(arg);
  if(!isFinite(t)||Math.abs(t)>300) return NaN;
  return a*t+d;
}
function evalFn(fn,x){
  const v=evalBase(fn,x);
  if(isNaN(v)) return NaN;
  return graphMode==='abs'?Math.abs(v):v;
}
function evalSP(x){return SP.p*Math.sin(x)+SP.q*Math.cos(x);}
function period(fn){
  const b=Math.abs(P[fn].b);
  if(b<1e-9) return Infinity;
  return fn==='tan'?Math.PI/b:2*Math.PI/b;
}

// ══════════════════════════════════
//  DRAW
// ══════════════════════════════════
function redraw(){
  const W=canvas.width/dpr,H=canvas.height/dpr;
  ctx.clearRect(0,0,W,H);
  ctx.fillStyle='#fff'; ctx.fillRect(0,0,W,H);
  drawGrid(W,H);
  drawAxes(W,H);
  if(graphMode==='superpos'){
    drawPath(x=>SP.p*Math.sin(x),FN_COLOR.sin,1.5,[5,4],W,H,'p·sin x');
    drawPath(x=>SP.q*Math.cos(x),FN_COLOR.cos,1.5,[5,4],W,H,'q·cos x');
    drawPath(evalSP,SUM_C,2.8,[],W,H,'合成');
  } else {
    FNS.forEach(fn=>{
      if(visible[fn]) drawPath(x=>evalFn(fn,x),FN_COLOR[fn],2.5,[],W,H,fn);
    });
  }
  updatePanel();
}

function drawGrid(W,H){
  const ox=originX,oy=originY,xs=Math.PI*scale;
  ctx.strokeStyle='rgba(48,96,224,.06)'; ctx.lineWidth=1;
  for(let i=Math.floor(-ox/xs);i<=(W-ox)/xs+1;i++){
    const x=ox+i*xs; ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke();
  }
  for(let i=Math.floor((oy-H)/scale);i<=Math.ceil(oy/scale);i++){
    const y=oy-i*scale; ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();
  }
}

function drawAxes(W,H){
  const ox=originX,oy=originY;
  ctx.setLineDash([]);
  ctx.strokeStyle='rgba(26,31,54,.22)'; ctx.lineWidth=1.5;
  // axes — stop x axis before arrow, full y axis
  ctx.beginPath();ctx.moveTo(0,oy);ctx.lineTo(W-4,oy);ctx.stroke();
  ctx.beginPath();ctx.moveTo(ox,0);ctx.lineTo(ox,H);ctx.stroke();
  // Arrow heads
  ctx.fillStyle='rgba(26,31,54,.7)';
  // x right ► tip at W-4, base at W-15
  ctx.beginPath();
  ctx.moveTo(W-15,oy-5);
  ctx.lineTo(W-4,oy);
  ctx.lineTo(W-15,oy+5);
  ctx.closePath();
  ctx.fill();
  // y top ▲ tip at 2
  ctx.beginPath();
  ctx.moveTo(ox-5,11);
  ctx.lineTo(ox,2);
  ctx.lineTo(ox+5,11);
  ctx.closePath();
  ctx.fill();
  // Labels — italic bold
  ctx.font=`italic bold 18px ${FU}`; ctx.fillStyle='rgba(40,55,120,.75)';
  ctx.textAlign='right'; ctx.fillText('x',W-18,oy-8);
  ctx.textAlign='left';  ctx.fillText('y',ox+8,16);
  // O
  ctx.font=`italic 15px ${FU}`; ctx.fillStyle='rgba(80,95,145,.65)';
  ctx.textAlign='right'; ctx.fillText('O',ox-7,oy+17);
  // y ticks — upright numbers
  ctx.font=`15px ${FU}`; ctx.fillStyle='rgba(80,95,145,.65)';
  for(let i=Math.floor((oy-H)/scale);i<=Math.ceil(oy/scale);i++){
    if(!i) continue;
    ctx.textAlign='right'; ctx.fillText(i,ox-8,oy-i*scale+5);
  }
  // x ticks — π labels
  const xs=Math.PI*scale;
  for(let i=Math.floor(-ox/xs);i<=(W-ox)/xs+1;i++){
    if(!i) continue;
    const x=ox+i*xs, ai=Math.abs(i);
    let lb;
    if(ai===1&&i>0) lb='π'; else if(ai===1&&i<0) lb='−π';
    else if(i>0) lb=ai+'π'; else lb='−'+ai+'π';
    ctx.textAlign='center'; ctx.fillText(lb,x,oy+18);
  }
}

function drawPath(evalF,color,lw,dash,W,H,label){
  ctx.strokeStyle=color; ctx.lineWidth=lw; ctx.setLineDash(dash);
  let started=false;
  ctx.beginPath();
  for(let px=0;px<=W;px+=0.5){
    const my=evalF(toMx(px));
    if(isNaN(my)){started=false;continue;}
    const sy=toSy(my);
    if(!started){ctx.moveTo(px,sy);started=true;}
    else{
      const pmy=evalF(toMx(px-0.5));
      if(!isNaN(pmy)&&Math.abs(my-pmy)*scale>H*0.8){
        ctx.stroke();ctx.beginPath();ctx.moveTo(px,sy);started=true;
      } else ctx.lineTo(px,sy);
    }
  }
  ctx.stroke(); ctx.setLineDash([]);
  // label at right edge — upright, bold
  const ex=toMx(W-30), ey=evalF(ex);
  if(!isNaN(ey)){
    const sy=toSy(ey);
    if(sy>6&&sy<H-6){
      ctx.fillStyle=color; ctx.font=`bold 15px ${FU}`;
      ctx.textAlign='right'; ctx.fillText(label,W-6,sy-7);
    }
  }
}

// ══════════════════════════════════
//  EQUATION BUILDERS
//  Rule: y, a, b, c, d, x → italic
//        numbers → upright (normal)
//        sin/cos/tan → upright
// ══════════════════════════════════

// For panel HTML
function eqHTML(fn){
  const{a,b,c,d}=P[fn];
  const vi=s=>`<i>${s}</i>`;
  const vn=s=>`<span style="font-style:normal">${s}</span>`;
  // = sign with proper spacing
  const veq=`<span style="font-style:normal;margin:0 0.18em">=</span>`;

  // a part
  let apart='';
  if(Math.abs(a)===1){
    apart=(a<0?vn('−'):'');
  } else if(a<0){
    apart=`${vn('−'+f2(Math.abs(a)))}`;
  } else {
    apart=vn(f2(a));
  }

  // bx part
  let bxpart='';
  if(Math.abs(b)===1){
    bxpart=(b<0?`${vn('−')}${vi('x')}`:vi('x'));
  } else if(b<0){
    bxpart=`${vn('−'+f2(Math.abs(b)))}${vi('x')}`;
  } else {
    bxpart=`${vn(f2(b))}${vi('x')}`;
  }

  // +c part
  let cpart='';
  if(c>0.001)  cpart=`${vn(' + '+f2(c))}`;
  else if(c<-0.001) cpart=`${vn(' − '+f2(Math.abs(c)))}`;

  // +d part
  let dpart='';
  if(d>0.001)  dpart=`${vn(' + '+f2(d))}`;
  else if(d<-0.001) dpart=`${vn(' − '+f2(Math.abs(d)))}`;

  const fnS=vn(fn); // sin/cos/tan upright
  const inner=`${bxpart}${cpart}`;

  // y = ... with space after =, both upright except y
  const lhs=`${vi('y')}${veq}`;

  if(graphMode==='abs'){
    return `${lhs}${vn('|')}${apart}${fnS}${vn('(')}${inner}${vn(')')}${dpart}${vn('|')}`;
  }
  return `${lhs}${apart}${fnS}${vn('(')}${inner}${vn(')')}${dpart}`;
}

// For canvas — plain text (canvas doesn't do HTML; numbers upright via default)
// We use ctx.font for italic parts by switching font
function drawEqOnCanvas(fn,x,y){
  const{a:av,b:bv,c:cv,d:dv}=P[fn];
  const color=FN_COLOR[fn];
  // Build plain string (canvas ignores italic markup, so we draw in italic ctx)
  // We just draw the equation in italic for variables and switch for numbers
  // Strategy: draw segment by segment
  const seg=buildEqSegments(fn,av,bv,cv,dv);
  let cx2=x;
  ctx.textBaseline='top';
  for(const s of seg){
    if(s.italic){
      ctx.font=`italic 15px ${FU}`;
    } else {
      ctx.font=`15px ${FU}`;
    }
    ctx.fillStyle=s.color||color;
    ctx.textAlign='left';
    ctx.fillText(s.t,cx2,y);
    cx2+=ctx.measureText(s.t).width;
  }
  ctx.textBaseline='alphabetic';
  return cx2-x; // width
}

function buildEqSegments(fn,a,b,c,d){
  // Returns array of {t, italic, color?}
  const it=(t,col)=>({t,italic:true,color:col});
  const up=(t,col)=>({t,italic:false,color:col});
  const col=FN_COLOR[fn];
  const seg=[];

  // y =·(space)
  seg.push(it('y = ',col));

  // a
  if(Math.abs(a)===1){
    if(a<0) seg.push(up('−',col));
    // if a===1 show nothing (implicit)
  } else if(a<0){
    seg.push(up('−'+f2(Math.abs(a)),col));
  } else {
    seg.push(up(f2(a),col));
  }

  // fn name upright
  seg.push(up(fn,col));
  seg.push(up('(',col));

  // bx
  if(Math.abs(b)===1){
    if(b<0) seg.push(up('−',col));
    seg.push(it('x',col));
  } else if(b<0){
    seg.push(up('−'+f2(Math.abs(b)),col));
    seg.push(it('x',col));
  } else {
    seg.push(up(f2(b),col));
    seg.push(it('x',col));
  }

  // +c
  if(c>0.001){seg.push(up(' + ',col));seg.push(up(f2(c),col));}
  else if(c<-0.001){seg.push(up(' − ',col));seg.push(up(f2(Math.abs(c)),col));}

  seg.push(up(')',col));

  // +d
  if(d>0.001){seg.push(up(' + ',col));seg.push(up(f2(d),col));}
  else if(d<-0.001){seg.push(up(' − ',col));seg.push(up(f2(Math.abs(d)),col));}

  if(graphMode==='abs'){
    seg.unshift(up('|',col));
    seg.push(up('|',col));
    // fix: wrap y= outside
    const yi=seg.findIndex(s=>s.t==='y = ');
    // already first, the | is before it – reorder
    const absBar=seg.shift(); // remove | from front
    const yEq=seg.shift();    // remove y =
    seg.unshift(absBar);
    seg.unshift(yEq);
    // add closing bar
  }

  return seg;
}

// Superpos canvas eq
function drawSPEqOnCanvas(x,y){
  const R=Math.sqrt(SP.p*SP.p+SP.q*SP.q);
  const theta=Math.atan2(SP.q,SP.p);
  const tStr=thetaStr(theta);
  // y = p·sin x + q·cos x = R·sin(x+θ)
  const segs=[
    {t:'y',italic:true},{t:' = ',italic:false},
    {t:f2(SP.p),italic:false},{t:'·sin ',italic:false},
    {t:'x',italic:true},{t:' + ',italic:false},
    {t:f2(SP.q),italic:false},{t:'·cos ',italic:false},
    {t:'x',italic:true},{t:' = ',italic:false},
    {t:f3(R)+'·sin(',italic:false},
    {t:'x',italic:true},
    {t:' + '+tStr+')',italic:false},
  ];
  let cx2=x;
  ctx.textBaseline='top';
  for(const s of segs){
    ctx.font=s.italic?`italic 15px ${FU}`:`15px ${FU}`;
    ctx.fillStyle=SUM_C;
    ctx.fillText(s.t,cx2,y);
    cx2+=ctx.measureText(s.t).width;
  }
  ctx.textBaseline='alphabetic';
}

// ══════════════════════════════════
//  DESCRIPTION
// ══════════════════════════════════
function descHTML(fn){
  const{a,b,c,d}=P[fn];
  const lines=[];
  const aa=Math.abs(a),ab=Math.abs(b||1e-9);
  const vi=s=>`<i>${s}</i>`;

  // a — 上下伸縮（統一用「伸縮」）
  if(Math.abs(aa-1)>0.01){
    if(aa>1) lines.push(`${vi('a')} = ${f2(aa)}，<b>上下伸縮 ${f2(aa)} 倍</b>（振幅 = ${f2(aa)}）`);
    else     lines.push(`${vi('a')} = ${f2(aa)}，<b>上下伸縮為 ${f2(aa)} 倍</b>（振幅 = ${f2(aa)}）`);
  } else {
    lines.push(`振幅 = 1`);
  }
  if(a<-0.001) lines.push(`<b>${vi('a')} &lt; 0，圖形上下翻轉</b>`);

  // b — 左右伸縮 / 週期
  const T=period(fn);
  const Ts=isFinite(T)?f2(T/Math.PI)+'π':'∞';
  if(Math.abs(ab-1)>0.01){
    if(ab>1) lines.push(`${vi('b')} = ${f2(bv=P[fn].b)}，<b>左右伸縮為 1/${f2(ab)} 倍</b>，週期 = ${Ts}`);
    else     lines.push(`${vi('b')} = ${f2(P[fn].b)}，<b>左右伸縮 ${f2(1/ab)} 倍</b>，週期 = ${Ts}`);
  } else {
    lines.push(`週期 = ${Ts}`);
  }
  if(b<-0.001) lines.push(`<b>${vi('b')} &lt; 0，圖形左右翻轉</b>`);

  // c — 相移
  if(Math.abs(c)>0.01){
    const shift=-c/(P[fn].b||1e-9);
    if(shift>0.001)       lines.push(`<b>向右平移 ${f2(Math.abs(shift))}</b>`);
    else if(shift<-0.001) lines.push(`<b>向左平移 ${f2(Math.abs(shift))}</b>`);
  }

  // d — 上下平移
  if(d>0.001)        lines.push(`<b>向上平移 ${f2(d)}</b>`);
  else if(d<-0.001)  lines.push(`<b>向下平移 ${f2(Math.abs(d))}</b>`);

  let extra='';
  if(graphMode==='abs') extra='<br>取絕對值：<i>x</i> 軸以下翻折，<b><i>y</i> 恆 ≥ 0</b>。';
  return lines.join('；')+extra;
}

// ══════════════════════════════════
//  SUPERPOS RESULT
// ══════════════════════════════════
function thetaStr(theta){
  const fracs=[[0,1],[1,6],[1,4],[1,3],[1,2],[2,3],[3,4],[5,6],[1,1],
               [-1,6],[-1,4],[-1,3],[-1,2],[-2,3],[-3,4],[-5,6],[-1,1]];
  const t=theta/Math.PI;
  for(const[n,d] of fracs){
    if(Math.abs(t-n/d)<0.005){
      if(n===0) return '0';
      const sign=n<0?'−':'';
      const an=Math.abs(n);
      if(d===1) return an===1?sign+'π':sign+an+'π';
      return an===1?sign+'π/'+d:sign+an+'π/'+d;
    }
  }
  return f3(theta);
}

function spResultHTML(){
  const p=SP.p,q=SP.q;
  const R=Math.sqrt(p*p+q*q);
  const theta=Math.atan2(q,p);
  const Rstr=f3(R),tStr=thetaStr(theta);
  const phi=Math.atan2(p,q);
  const phiStr=thetaStr(phi);
  const vi=s=>`<i>${s}</i>`;
  const vn=s=>`<span style="font-style:normal">${s}</span>`;
  return `
<div style="line-height:2.1;font-size:14px;">
  ${vi('y')} = ${vn(f2(p))}·sin ${vi('x')} + ${vn(f2(q))}·cos ${vi('x')}<br>
  &nbsp;&nbsp;= ${vn(Rstr)}·(${vn(f2(p)+'/'+(Rstr||1))}·sin ${vi('x')} + ${vn(f2(q)+'/'+(Rstr||1))}·cos ${vi('x')})<br>
  &nbsp;&nbsp;= ${vn(Rstr)}·(sin ${vi('x')}·cos${vi('θ')} + cos ${vi('x')}·sin${vi('θ')})<br>
  &nbsp;&nbsp;= <b style="color:${SUM_C}">${vn(Rstr)}·sin(${vi('x')} + ${vn(tStr)})</b>
</div>
<div style="font-size:12px;color:var(--dim);margin-top:7px;border-top:1px solid var(--border);padding-top:6px;line-height:1.9;">
  其中 ${vi('θ')} 滿足：cos${vi('θ')} = ${vn(f3(p/(R||1e-9)))}，sin${vi('θ')} = ${vn(f3(q/(R||1e-9)))}<br>
  亦可改寫：${vi('y')} = <b style="color:${SUM_C}">${vn(Rstr)}·cos(${vi('x')} − ${vn(phiStr)})</b><br>
  其中 ${vi('φ')} 滿足：cos${vi('φ')} = ${vn(f3(q/(R||1e-9)))}，sin${vi('φ')} = ${vn(f3(p/(R||1e-9)))}<br>
  <b style="color:var(--sum-c)">R = √(p² + q²) = √(${f2(p)}² + ${f2(q)}²) = ${Rstr}</b>
</div>`;
}

// ══════════════════════════════════
//  UPDATE PANEL
// ══════════════════════════════════
function sH(id,h){const e=document.getElementById(id);if(e)e.innerHTML=h;}
function sS(id,v){const e=document.getElementById(id);if(e)e.value=v;}
function safeSet(id,v){
  const e=document.getElementById(id);
  if(e&&document.activeElement!==e) e.value=f2(v);
}

function updatePanel(){
  // Equations in panel
  FNS.forEach(fn=>{
    sH(fn+'Eq',eqHTML(fn));
    sH(fn+'Desc',descHTML(fn));
  });
  // Number inputs + sliders
  FNS.forEach(fn=>{
    const{a,b,c,d}=P[fn];
    const F=fn[0].toUpperCase()+fn.slice(1);
    safeSet(`n${F}A`,a);safeSet(`n${F}B`,b);safeSet(`n${F}C`,c);safeSet(`n${F}D`,d);
    sS(`s${F}A`,a);sS(`s${F}B`,b);sS(`s${F}C`,c);sS(`s${F}D`,d);
  });
  safeSet('nSP',SP.p); safeSet('nSQ',SP.q);
  sS('sSP',SP.p); sS('sSQ',SP.q);

  // fn chips: lock in superpos mode (sin+cos forced)
  const isSP=graphMode==='superpos';
  document.querySelectorAll('.fn-chip').forEach(el=>{
    if(isSP){
      el.classList.add('locked');
      // force sin+cos visible
      if(el.dataset.fn==='sin'||el.dataset.fn==='cos') el.classList.add('on');
      else el.classList.remove('on');
    } else {
      el.classList.remove('locked');
      el.classList.toggle('on',visible[el.dataset.fn]);
    }
  });
  if(isSP){visible.sin=true;visible.cos=true;}

  // Section visibility
  FNS.forEach(fn=>{
    const sec=document.getElementById(fn+'Sec');
    if(sec) sec.style.display=(visible[fn]&&!isSP)?'':'none';
  });
  const spSec=document.getElementById('superposSec');
  if(spSec) spSec.style.display=isSP?'':'none';

  // Mode chips
  document.getElementById('modeNormal')  .classList.toggle('on',graphMode==='normal');
  document.getElementById('modeAbs')     .classList.toggle('on',graphMode==='abs');
  document.getElementById('modeSuperpos').classList.toggle('on',graphMode==='superpos');

  // Mode desc
  const md=document.getElementById('modeDesc');
  if(graphMode==='abs'){
    md.style.display='';
    md.innerHTML=`絕對值模式：<i>y</i> = |<span style="font-style:normal">f</span>(<i>x</i>)|，<i>x</i> 軸以下翻折，<b><i>y</i> 恆 ≥ 0</b>。`;
  } else if(isSP){
    md.style.display='';
    md.innerHTML=`正餘弦疊合：<i>y</i> = <i>p</i>·sin <i>x</i> + <i>q</i>·cos <i>x</i>，化為單一 sin 或 cos。<br>此模式下固定顯示 sin 與 cos 分量。`;  } else {
    md.style.display='none';
  }
  if(isSP) sH('spResult',spResultHTML());

  // ── Float info box (bottom right) — show equations ──
  let html='';
  if(isSP){
    const R=Math.sqrt(SP.p*SP.p+SP.q*SP.q);
    const theta=Math.atan2(SP.q,SP.p);
    const tStr=thetaStr(theta);
    const phi=Math.atan2(SP.p,SP.q);
    const phiStr=thetaStr(phi);
    html=`
    <div class="fi-row">
      <span class="fi-dot" style="background:${FN_COLOR.sin}"></span>
      <span class="fi-text"><i>y</i><span style="font-style:normal;margin:0 0.18em">=</span><span style="font-style:normal">${f2(SP.p)}</span>·sin <i>x</i></span>
    </div>
    <div class="fi-row">
      <span class="fi-dot" style="background:${FN_COLOR.cos}"></span>
      <span class="fi-text"><i>y</i><span style="font-style:normal;margin:0 0.18em">=</span><span style="font-style:normal">${f2(SP.q)}</span>·cos <i>x</i></span>
    </div>
    <div class="fi-row">
      <span class="fi-dot" style="background:${SUM_C}"></span>
      <span class="fi-text"><b style="color:${SUM_C}"><i>y</i><span style="font-style:normal;margin:0 0.18em">=</span><span style="font-style:normal">${f3(R)}</span>·sin(<i>x</i><span style="font-style:normal;margin:0 0.15em">+</span><span style="font-style:normal">${tStr}</span>)</b></span>
    </div>`;
  } else {
    FNS.forEach(fn=>{
      if(!visible[fn])return;
      html+=`<div class="fi-row">
        <span class="fi-dot" style="background:${FN_COLOR[fn]}"></span>
        <span class="fi-text">${eqHTML(fn)}</span>
      </div>`;
    });
  }
  if(!html) html='<span style="color:var(--light);font-size:13px">請選擇至少一個函數</span>';
  sH('fiContent',html);
}

// ══════════════════════════════════
//  CONTROLS
// ══════════════════════════════════
function toggleFn(fn){
  if(graphMode==='superpos') return; // locked
  visible[fn]=!visible[fn];
  redraw();
}
function setMode(m){
  graphMode=m;
  if(m==='superpos'){visible.sin=true;visible.cos=true;}
  redraw();
}
function resetAll(){
  FNS.forEach(fn=>{P[fn]={a:1,b:1,c:0,d:0};});
  SP.p=1;SP.q=1;
  visible.sin=true;visible.cos=false;visible.tan=false;
  graphMode='normal';
  const r=canvas.parentElement.getBoundingClientRect();
  originX=r.width/2;originY=r.height/2;scale=60;_init=true;
  redraw();
}

// ══════════════════════════════════
//  MOUSE / TOUCH
// ══════════════════════════════════
let panRef=null,pinchDist=null;
canvas.addEventListener('mousedown',e=>{e.preventDefault();panRef={sx:e.clientX,sy:e.clientY,ox:originX,oy:originY};canvas.style.cursor='move';});
canvas.addEventListener('mousemove',e=>{if(!panRef)return;originX=panRef.ox+(e.clientX-panRef.sx);originY=panRef.oy+(e.clientY-panRef.sy);redraw();});
canvas.addEventListener('mouseup',()=>{panRef=null;canvas.style.cursor='default';});
canvas.addEventListener('mouseleave',()=>{panRef=null;});
canvas.addEventListener('contextmenu',e=>e.preventDefault());
canvas.addEventListener('wheel',e=>{
  e.preventDefault();
  const r=canvas.getBoundingClientRect(),px=e.clientX-r.left,py=e.clientY-r.top;
  const f=e.deltaY<0?1.12:0.89,old=scale;
  scale=Math.max(15,Math.min(500,scale*f));
  originX=px-(px-originX)*(scale/old);originY=py-(py-originY)*(scale/old);
  redraw();
},{passive:false});
canvas.addEventListener('touchstart',e=>{
  e.preventDefault();
  if(e.touches.length===2){pinchDist=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);panRef=null;return;}
  const r=canvas.getBoundingClientRect();
  panRef={sx:e.touches[0].clientX-r.left,sy:e.touches[0].clientY-r.top,ox:originX,oy:originY};
},{passive:false});
canvas.addEventListener('touchmove',e=>{
  e.preventDefault();
  if(e.touches.length===2&&pinchDist){const nd=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);scale=Math.max(15,Math.min(500,scale*nd/pinchDist));pinchDist=nd;redraw();return;}
  if(!panRef)return;
  const r=canvas.getBoundingClientRect();
  originX=panRef.ox+(e.touches[0].clientX-r.left-panRef.sx);
  originY=panRef.oy+(e.touches[0].clientY-r.top-panRef.sy);redraw();
},{passive:false});
canvas.addEventListener('touchend',e=>{e.preventDefault();panRef=null;pinchDist=null;},{passive:false});

// ══════════════════════════════════
//  MOBILE DRAWER
// ══════════════════════════════════
function openDrawer(){document.getElementById('MOV').classList.add('open');}
function closeDrawer(){document.getElementById('MOV').classList.remove('open');}

(function buildMobile(){
  const dest=document.getElementById('mobContent');
  Array.from(document.querySelector('.panel').children).forEach(sec=>{
    const clone=sec.cloneNode(true);
    clone.querySelectorAll('.fn-chip').forEach(el=>{const fn=el.dataset.fn;el.onclick=()=>toggleFn(fn);});
    clone.querySelectorAll('.mode-chip').forEach(el=>{
      const id=el.id;
      if(id==='modeNormal') el.onclick=()=>setMode('normal');
      if(id==='modeAbs')    el.onclick=()=>setMode('abs');
      if(id==='modeSuperpos')el.onclick=()=>setMode('superpos');
      if(id) el.id='m'+id;
    });
    clone.querySelectorAll('input[type=number]').forEach(el=>{
      const oid=el.id;el.id='m'+oid;el.oninput=null;
      el.addEventListener('input',function(){
        if(oid==='nSP'){SP.p=+this.value;redraw();return;}
        if(oid==='nSQ'){SP.q=+this.value;redraw();return;}
        const m=oid.match(/^n([A-Z][a-z]+)([A-Za-z])$/);
        if(!m)return;
        P[m[1].toLowerCase()][m[2].toLowerCase()]=+this.value;redraw();
      });
    });
    clone.querySelectorAll('input[type=range]').forEach(el=>{
      const oid=el.id;el.id='m'+oid;el.oninput=null;
      el.addEventListener('input',function(){
        if(oid==='sSP'){SP.p=+this.value;redraw();return;}
        if(oid==='sSQ'){SP.q=+this.value;redraw();return;}
        const m=oid.match(/^s([A-Z][a-z]+)([A-Za-z])$/);
        if(!m)return;
        P[m[1].toLowerCase()][m[2].toLowerCase()]=+this.value;redraw();
      });
    });
    dest.appendChild(clone);
  });
})();

// sp slider thumb colour
const st=document.createElement('style');
st.textContent=`.r-sp::-webkit-slider-thumb{background:${SUM_C}!important;width:20px;height:20px;border-radius:50%;border:3px solid #fff;box-shadow:0 1px 5px rgba(0,0,0,.25);cursor:pointer;-webkit-appearance:none;}
.r-sp::-moz-range-thumb{background:${SUM_C}!important;width:20px;height:20px;border-radius:50%;border:3px solid #fff;box-shadow:0 1px 5px rgba(0,0,0,.25);cursor:pointer;}`;
document.head.appendChild(st);

// ══ INIT ══
resize();
</script>
